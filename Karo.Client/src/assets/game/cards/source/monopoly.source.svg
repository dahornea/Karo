<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" data-style="karo-card-v3" role="img" aria-labelledby="monopoly-title monopoly-desc">
  <title id="monopoly-title">Monopoly concentrates one Supply type</title>
  <desc id="monopoly-desc">Four matching Supply tokens follow clear inward arrows into one controlled central stack.</desc>
  <defs>
    <linearGradient id="monopoly-bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#263e4d"/>
      <stop offset="1" stop-color="#65465e"/>
    </linearGradient>
    <linearGradient id="monopoly-gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f5dc86"/>
      <stop offset="1" stop-color="#bd803b"/>
    </linearGradient>
    <filter id="monopoly-shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#1f2734" flood-opacity="0.45"/>
    </filter>
    <marker id="monopoly-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1l8 4-8 4z" fill="#f1d77e"/>
    </marker>
  </defs>
  <rect width="480" height="300" fill="url(#monopoly-bg)"/>
  <circle cx="240" cy="150" r="116" fill="#f4d982" opacity="0.08"/>
  <path d="M0 238c82-30 156-14 235 4 84 19 161 18 245-9v67H0z" fill="#202d3a" opacity="0.66"/>

  <g id="matching-supplies" filter="url(#monopoly-shadow)">
    <g fill="url(#monopoly-gold)" stroke="#24343f" stroke-width="6">
      <circle cx="91" cy="91" r="29"/>
      <circle cx="389" cy="91" r="29"/>
      <circle cx="91" cy="211" r="29"/>
      <circle cx="389" cy="211" r="29"/>
    </g>
    <g fill="none" stroke="#3f7054" stroke-linecap="round" stroke-linejoin="round" stroke-width="6">
      <path d="M78 96c15-23 29-22 31-22-3 18-13 29-31 31 6-8 12-14 21-21"/>
      <path d="M376 96c15-23 29-22 31-22-3 18-13 29-31 31 6-8 12-14 21-21"/>
      <path d="M78 216c15-23 29-22 31-22-3 18-13 29-31 31 6-8 12-14 21-21"/>
      <path d="M376 216c15-23 29-22 31-22-3 18-13 29-31 31 6-8 12-14 21-21"/>
    </g>
    <g fill="none" stroke="#f1d77e" stroke-linecap="round" stroke-width="5" marker-end="url(#monopoly-arrow)">
      <path d="M126 107l60 27"/>
      <path d="M354 107l-60 27"/>
      <path d="M126 195l60-27"/>
      <path d="M354 195l-60-27"/>
    </g>
  </g>

  <g id="hero-control" transform="translate(178 82)" filter="url(#monopoly-shadow)">
    <ellipse cx="62" cy="128" rx="67" ry="22" fill="#192833" opacity="0.55"/>
    <path d="M17 95h90v34H17z" fill="#9f6436" stroke="#263640" stroke-width="7"/>
    <path d="M11 72h102v32H11z" fill="#c1863e" stroke="#263640" stroke-width="7"/>
    <path d="M5 47h114v34H5z" fill="url(#monopoly-gold)" stroke="#263640" stroke-width="7"/>
    <circle cx="62" cy="42" r="38" fill="#f1d77e" stroke="#263640" stroke-width="8"/>
    <path d="M45 48c20-31 37-29 40-29-4 24-18 39-41 41 8-10 17-19 29-28" fill="none" stroke="#3f7054" stroke-linecap="round" stroke-linejoin="round" stroke-width="8"/>
  </g>
</svg>
